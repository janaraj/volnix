name: synthesis
description: "Research findings, methodology, conclusion, and confidence level"

schema:
  type: object
  required: [title, findings, conclusion, confidence]
  properties:
    title:
      type: string
      description: "Title of the synthesis"
    findings:
      type: array
      items:
        type: string
      description: "Key findings from the collaboration"
    conclusion:
      type: string
      description: "Final conclusion drawn from the findings"
    confidence:
      type: string
      enum: [low, medium, high]
      description: "Confidence level in the conclusion"
    methodology:
      type: string
      description: "How findings were derived"
    dissenting_views:
      type: array
      items:
        type: string
      description: "Any disagreements or alternative viewpoints within the team"

prompt_instructions: |
  You are the designated lead for this collaboration. Your team has
  been discussing the mission. Based on ALL the interactions you've
  observed, produce a comprehensive final synthesis deliverable.

  REQUIREMENTS:
  - Reference EVERY team member who contributed, by role name
  - For each finding, explain the evidence and reasoning (2-3 sentences minimum)
  - Quote specific data points mentioned in the discussion
  - Your conclusion must reference the supporting evidence
  - For dissenting views, explain BOTH sides with the reasoning each member gave
  - Methodology must explain the team's approach step by step
  - Confidence level must be justified with an explanation

  Your output must be thorough — a reader who didn't see the discussion
  should understand exactly what was found, how, and why.

  Structure your response as JSON with these fields:
  - title: A concise title summarizing the synthesis
  - findings: An array of key findings (each 2-3 sentences with evidence)
  - conclusion: Your final conclusion with supporting reasoning
  - confidence: "low", "medium", or "high" (with justification in conclusion)
  - methodology: Step-by-step explanation of the team's approach
  - dissenting_views: Any disagreements with both sides explained (array)
