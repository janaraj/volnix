# Incident Response World Blueprint
# First-class Terrarium blueprint for DevOps incident response scenarios.
world:
  name: "Incident Response"
  description: >
    A DevOps team responding to production incidents. On-call engineer triages
    alerts, coordinates via chat, tracks in repos, and manages the incident
    under commander approval for production deployments.

  services:
    slack: verified/slack
    github: verified/github
    google_calendar: verified/google_calendar

  actors:
    - role: oncall-engineer
      type: external
      count: 1
      permissions:
        read: [slack, github, google_calendar]
        write: [slack, github]
      budget:
        api_calls: 200
        llm_spend: 5.00

    - role: incident-commander
      type: internal
      count: 1
      permissions:
        read: [slack, github, google_calendar]
        write: [slack, github, google_calendar]

    - role: sre-lead
      type: internal
      count: 1

  policies:
    - name: "Deploy approval"
      description: "Require incident commander approval for production deployments."
      trigger: "production deployment during active incident"
      enforcement: hold

    - name: "Severity escalation"
      description: "Auto-escalate SEV1 incidents to SRE lead."
      trigger: "incident severity = 1"
      enforcement: escalate

  seeds:
    - "SEV2 alert: API latency spike affecting 15% of requests"
    - "Database connection pool exhaustion warning from monitoring"

compiler:
  seed: 42
  behavior: dynamic
  fidelity: auto
  mode: governed
  reality:
    preset: messy
