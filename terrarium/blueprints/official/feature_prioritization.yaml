# Feature Prioritization Blueprint
# Internal-only world: product team decides which feature to build next.
world:
  name: "Feature Prioritization Decision"
  description: >
    A product team at a growing B2B SaaS company must decide which feature
    to prioritize for the next quarter. Resources are limited and each
    option has strong advocates. The team must weigh customer demand,
    engineering effort, and strategic value to produce a clear decision.

  services:
    slack: verified/slack

  actors:
    - role: product-lead
      type: internal
      count: 1
      personality: >
        Strategic thinker who balances customer needs with business goals.
        Facilitates structured discussions and insists on data-backed
        arguments. Will not approve decisions without clear rationale.
      permissions:
        read: [slack]
        write: [slack]

    - role: engineer
      type: internal
      count: 1
      personality: >
        Pragmatic builder who evaluates options by technical complexity and
        long-term maintenance burden. Advocates for API v2 due to
        accumulated tech debt. Skeptical of scope creep.
      permissions:
        read: [slack]
        write: [slack]

    - role: designer
      type: internal
      count: 1
      personality: >
        User-centric advocate passionate about dark mode due to consistent
        user feedback. Values accessibility and user satisfaction over
        engineering convenience.
      permissions:
        read: [slack]
        write: [slack]

  policies:
    - name: "Evidence-backed decision"
      description: "Final recommendation must consider customer demand, engineering effort, strategic value, and churn risk."
      trigger: "recommendation without supporting data"
      enforcement: hold
      hold_config:
        approver_role: product-lead
        timeout: 2h

    - name: "Decision traceability"
      description: "Final prioritization must include rationale and alternatives considered."
      trigger: "decision finalized"
      enforcement: log

  seeds:
    - "Customer surveys: 40% want dark mode, 30% want API v2, 20% want mobile app"
    - "Engineering estimates: dark mode 3 weeks, API v2 8 weeks, mobile app 12 weeks"
    - "Two enterprise customers threatened to churn without API v2"
    - "Mobile app usage from competitors shows 60% engagement lift"

  mission: >
    Decide which feature to prioritize: dark mode, API v2, or mobile app.
    Consider customer demand, engineering effort, strategic value, and
    churn risk. Produce a decision with rationale and alternatives.

compiler:
  seed: 42
  behavior: dynamic
  fidelity: auto
  mode: governed
  reality:
    preset: messy
