# Open Sandbox World Blueprint
# Minimal world with all service packs and no governance policies.
world:
  name: "Open Sandbox"
  description: >
    Minimal starter world with all services enabled and no governance.
    Use this for exploration, testing, and prototyping.

  services:
    email: verified/email
    chat: verified/chat
    tickets: verified/tickets
    payments: profiled/stripe
    repos: verified/repos
    calendar: verified/calendar

  actors:
    - role: agent
      type: external
      count: 1
      permissions:
        read: [email, chat, tickets, payments, repos, calendar]
        write: [email, chat, tickets, payments, repos, calendar]
      budget:
        api_calls: 1000

  policies: []

compiler:
  seed: 42
  behavior: static
  fidelity: auto
  mode: ungoverned
  reality:
    preset: ideal
