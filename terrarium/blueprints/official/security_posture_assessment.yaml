# Security Posture Assessment Blueprint
# Internal-only world: security team assesses risks and compliance gaps.
world:
  name: "Security Posture Assessment"
  description: >
    Quarterly security posture assessment led by an internal security team.
    Recent incidents, overdue patches, audit gaps, and infrastructure
    weaknesses must be reviewed. The team ranks risks and produces a
    prioritized remediation plan. Vulnerability tickets tracked in Zendesk.

  services:
    slack: verified/slack
    zendesk: verified/zendesk

  actors:
    - role: security-lead
      type: internal
      count: 1
      personality: >
        Strategic thinker who balances risk mitigation with business
        enablement. Prioritizes actual exploitability over theoretical
        severity. Final authority on risk ranking.
      permissions:
        read: [slack, zendesk]
        write: [slack, zendesk]

    - role: network-engineer
      type: internal
      count: 1
      personality: >
        Infrastructure-focused specialist in network segmentation,
        firewall rules, and traffic analysis. Tends to over-index on
        network-layer risks. Detailed and thorough.
      permissions:
        read: [slack, zendesk]
        write: [slack, zendesk]

    - role: compliance-officer
      type: internal
      count: 1
      personality: >
        Regulatory-focused and risk-averse. Tracks SOC 2 and GDPR
        compliance. Insists on documented controls and auditable evidence
        for every finding.
      permissions:
        read: [slack, zendesk]
        write: [slack, zendesk]

  policies:
    - name: "Critical risk consensus"
      description: "Critical or urgent items must be reviewed by security lead before finalization."
      trigger: "critical risk identified"
      enforcement: hold
      hold_config:
        approver_role: security-lead
        timeout: 24h

    - name: "Audit gap escalation"
      description: "Compliance gaps threatening SOC 2 readiness must be escalated immediately."
      trigger: "compliance gap identified"
      enforcement: escalate
      hold_config:
        approver_role: compliance-officer
        timeout: 12h

    - name: "Assessment traceability"
      description: "All material findings and decisions should be recorded."
      trigger: "finding documented"
      enforcement: log

  seeds:
    - "Last quarter's pentest found 3 critical and 7 high vulnerabilities"
    - "Two critical patches are 30 days overdue on production servers"
    - "SOC 2 audit in 6 weeks — 4 controls have documented gaps"
    - "Phishing attempt last month compromised one employee credential"
    - "New microservices deployment has no network segmentation yet"

  mission: >
    Assess current security posture. Identify and rank risks, document
    compliance gaps and strengths, and produce a prioritized action plan
    with owners and deadlines.

compiler:
  seed: 42
  behavior: dynamic
  fidelity: auto
  mode: governed
  reality:
    preset: messy
