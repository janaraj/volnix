state_machines:
- entity_type: message
  field: status
  transitions:
    queued:
    - sent
    - failed
    sent:
    - delivered
    - bounced
    delivered:
    - read
    - archived
    - trashed
    - spam
    read:
    - archived
    - trashed
    - spam
    bounced: []
    failed: []
    archived:
    - read
    - trashed
    trashed:
    - archived
    spam:
    - archived
    - trashed
- entity_type: draft
  field: status
  transitions:
    draft:
    - draft
    - sent
    - deleted
    sent: []
    deleted: []
- entity_type: thread
  field: status
  transitions:
    open:
    - pending
    - closed
    - archived
    pending:
    - open
    - closed
    - archived
    closed:
    - open
    - archived
    archived:
    - open
error_modes:
- code: INVALID_RECIPIENT
  when: One or more recipient email addresses are malformed or rejected by validation.
  http_status: 400
  response_body: {}
- code: MESSAGE_NOT_FOUND
  when: The requested message_id does not exist or is not visible in the mailbox.
  http_status: 404
  response_body: {}
- code: DRAFT_NOT_FOUND
  when: The requested draft_id does not exist.
  http_status: 404
  response_body: {}
- code: THREAD_NOT_FOUND
  when: The requested thread_id does not exist.
  http_status: 404
  response_body: {}
- code: FOLDER_FORBIDDEN
  when: The caller attempts to move a message into a restricted or unknown folder.
  http_status: 403
  response_body: {}
- code: SEND_CONFLICT
  when: A draft has already been sent or deleted and cannot be sent again.
  http_status: 409
  response_body: {}
- code: RATE_LIMITED
  when: The mailbox or tenant has exceeded allowed request volume.
  http_status: 403
  response_body: {}
behavioral_notes:
- The service is thread-oriented even when single-message endpoints are used; replies
  commonly attach to an existing thread.
- Message list operations usually return summaries, while detail endpoints return
  full bodies and participant metadata.
- Sending may be asynchronous, so newly sent messages can appear first as queued before
  reaching sent or delivered.
- Folder and flag mutations do not alter message content, only mailbox state.
- Drafts are mutable until sent or deleted.
examples: []
responder_prompt: 'You are simulating the email API.

  Use the defined operations, entities, and error modes consistently.

  Treat this as a generic modern email platform with REST-style endpoints.

  Return realistic IDs, timestamps, thread relationships, and mailbox folder behavior.

  Preserve state across calls: sent messages create or extend threads, drafts remain
  editable until sent, and folder or flag changes mutate existing entities.

  Enforce required parameters and state machine transitions.

  Prefer plausible operational behavior over idealized behavior, including asynchronous
  send states and occasional conflicts.

  If a request references a missing entity, return the corresponding 404-style error
  mode.

  If recipients are invalid, return INVALID_RECIPIENT.

  If a mutation violates entity state, return the appropriate conflict error.'
