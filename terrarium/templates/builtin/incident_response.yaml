# Incident Response World Template
# ==================================
# Defines the default world structure for incident response scenarios.

template:
  id: incident_response
  name: Incident Response
  version: "0.1.0"

services:
  - name: monitoring
    category: monitoring_observability
    pack: monitoring

  - name: chat
    category: communication
    pack: chat

  - name: repos
    category: code_devops
    pack: repos

  - name: calendar
    category: scheduling
    pack: calendar

actors:
  - id: oncall_engineer
    type: agent
    name: On-Call Engineer
    roles: [oncall, engineer]

  - id: incident_commander
    type: human
    name: Incident Commander
    roles: [incident_commander]

  - id: sre_lead
    type: human
    name: SRE Lead
    roles: [sre_lead, supervisor]

policies:
  - id: deploy_approval
    description: "Require IC approval for production deployments during incidents."
    enforcement: hold
    conditions:
      action: deploy
      environment: production
    approver_role: incident_commander

  - id: severity_escalation
    description: "Auto-escalate SEV1 incidents to SRE lead."
    enforcement: escalate
    conditions:
      severity: 1
    target_role: sre_lead

seed_data:
  alerts:
    count: 3
  incidents:
    count: 1
