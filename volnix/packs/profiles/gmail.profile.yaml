profile_name: gmail
service_name: gmail
category: communication
version: 0.1.0
fidelity_source: bootstrapped
operations:
- name: gmail_list_messages
  service: gmail
  description: Lists messages in a user's mailbox, optionally filtered by query or
    label.
  http_method: GET
  http_path: /gmail/v1/users/{userId}/messages
  parameters:
    userId:
      type: string
    q:
      type: string
    labelIds:
      type: string
    maxResults:
      type: string
    pageToken:
      type: string
    includeSpamTrash:
      type: string
  required_params:
  - userId
  response_schema:
    type: object
    properties:
      messages:
        type: string
      nextPageToken:
        type: string
      resultSizeEstimate:
        type: string
  is_read_only: true
- name: gmail_get_message
  service: gmail
  description: Retrieves a specific message by ID.
  http_method: GET
  http_path: /gmail/v1/users/{userId}/messages/{id}
  parameters:
    userId:
      type: string
    id:
      type: string
    format:
      type: string
  required_params:
  - userId
  - id
  response_schema:
    type: object
    properties:
      id:
        type: string
      threadId:
        type: string
      labelIds:
        type: string
      snippet:
        type: string
      historyId:
        type: string
      internalDate:
        type: string
      payload:
        type: string
      sizeEstimate:
        type: string
      raw:
        type: string
  is_read_only: true
- name: gmail_send_message
  service: gmail
  description: Sends a new email message or reply.
  http_method: POST
  http_path: /gmail/v1/users/{userId}/messages/send
  parameters:
    userId:
      type: string
    raw:
      type: string
    threadId:
      type: string
  required_params:
  - userId
  - raw
  response_schema:
    type: object
    properties:
      id:
        type: string
      threadId:
        type: string
      labelIds:
        type: string
  is_read_only: false
  creates_entity: message
  mutates_entity: thread
- name: gmail_create_draft
  service: gmail
  description: Creates a draft email message.
  http_method: POST
  http_path: /gmail/v1/users/{userId}/drafts
  parameters:
    userId:
      type: string
    raw:
      type: string
    threadId:
      type: string
  required_params:
  - userId
  - raw
  response_schema:
    type: object
    properties:
      id:
        type: string
      message:
        type: string
  is_read_only: false
  creates_entity: message
  mutates_entity: thread
- name: gmail_list_threads
  service: gmail
  description: Lists conversation threads in a user's mailbox.
  http_method: GET
  http_path: /gmail/v1/users/{userId}/threads
  parameters:
    userId:
      type: string
    q:
      type: string
    labelIds:
      type: string
    maxResults:
      type: string
    pageToken:
      type: string
  required_params:
  - userId
  response_schema:
    type: object
    properties:
      threads:
        type: string
      nextPageToken:
        type: string
      resultSizeEstimate:
        type: string
  is_read_only: true
- name: gmail_get_thread
  service: gmail
  description: Retrieves a conversation thread with its messages.
  http_method: GET
  http_path: /gmail/v1/users/{userId}/threads/{id}
  parameters:
    userId:
      type: string
    id:
      type: string
    format:
      type: string
  required_params:
  - userId
  - id
  response_schema:
    type: object
    properties:
      id:
        type: string
      historyId:
        type: string
      messages:
        type: string
  is_read_only: true
- name: gmail_modify_message
  service: gmail
  description: Adds or removes labels on a message.
  http_method: POST
  http_path: /gmail/v1/users/{userId}/messages/{id}/modify
  parameters:
    userId:
      type: string
    id:
      type: string
    addLabelIds:
      type: string
    removeLabelIds:
      type: string
  required_params:
  - userId
  - id
  response_schema:
    type: object
    properties:
      id:
        type: string
      threadId:
        type: string
      labelIds:
        type: string
  is_read_only: false
  mutates_entity: message
- name: gmail_trash_message
  service: gmail
  description: Moves a message to trash.
  http_method: POST
  http_path: /gmail/v1/users/{userId}/messages/{id}/trash
  parameters:
    userId:
      type: string
    id:
      type: string
  required_params:
  - userId
  - id
  response_schema:
    type: object
    properties:
      id:
        type: string
      threadId:
        type: string
      labelIds:
        type: string
  is_read_only: false
  mutates_entity: message
- name: gmail_untrash_message
  service: gmail
  description: Restores a trashed message to the mailbox.
  http_method: POST
  http_path: /gmail/v1/users/{userId}/messages/{id}/untrash
  parameters:
    userId:
      type: string
    id:
      type: string
  required_params:
  - userId
  - id
  response_schema:
    type: object
    properties:
      id:
        type: string
      threadId:
        type: string
      labelIds:
        type: string
  is_read_only: false
  mutates_entity: message
