state_machines:
- entity_type: message
  field: status
  transitions:
    draft:
    - sent
    - trashed
    sent:
    - delivered
    - bounced
    - trashed
    delivered:
    - read
    - archived
    - trashed
    read:
    - archived
    - trashed
    archived:
    - read
    - trashed
    bounced:
    - draft
    - trashed
    trashed:
    - draft
- entity_type: thread
  field: status
  transitions:
    open:
    - pending
    - closed
    pending:
    - open
    - closed
    closed:
    - open
- entity_type: delivery
  field: status
  transitions:
    queued:
    - sent
    - failed
    sent:
    - delivered
    - failed
    delivered:
    - opened
    opened: []
    failed:
    - queued
error_modes:
- code: INVALID_ARGUMENT
  when: Required parameters are missing, malformed, or raw MIME content cannot be
    parsed.
  http_status: 400
  response_body: {}
- code: PERMISSION_DENIED
  when: The caller lacks mailbox access or attempts an operation outside granted scopes.
  http_status: 403
  response_body: {}
- code: NOT_FOUND
  when: The specified message, thread, or user mailbox does not exist.
  http_status: 404
  response_body: {}
- code: CONFLICT
  when: A state transition is invalid, such as untrashing a message that is not in
    trash.
  http_status: 409
  response_body: {}
behavioral_notes:
- Gmail is mailbox-centric; most operations are scoped under a user mailbox identified
  by userId, often using me in real integrations.
- Sending and draft creation accept base64url-encoded raw MIME messages and may associate
  a message with an existing thread when threadId and headers align.
- Read and archive semantics are commonly represented through labels such as UNREAD,
  INBOX, SENT, and TRASH rather than a single explicit status field.
- Thread membership is derived from message conversation linkage and subject/header
  relationships; thread status in simulation may be an overlay for support workflows.
- Visibility is primarily controlled by mailbox identity and OAuth scopes rather than
  per-message ACLs, but simulation may model mailbox folders as channels with visibility
  rules.
examples: []
responder_prompt: 'You are simulating the gmail API.


  Model the service as a realistic mailbox and conversation system inspired by Gmail''s
  REST API.

  Use mailbox-scoped resources under a userId, with messages and threads as the primary
  entities.

  Interpret semantic primitives as follows:

  - channel: mailbox partitions such as inbox, sent, trash, spam, or label-backed
  views

  - thread: a conversation thread containing one or more related messages

  - message: an email item with headers, body, labels, and delivery metadata

  - delivery: send/delivery tracking for outbound messages

  - visibility_rule: mailbox or channel visibility constraints based on identity and
  scope


  Follow these rules:

  - Enforce required parameters and return the declared error modes when appropriate.

  - Keep IDs stable once created.

  - Treat send and draft creation as accepting raw MIME payloads, but you may simulate
  parsing into basic fields.

  - Maintain consistent relationships between messages, threads, deliveries, and channels.

  - Prefer realistic Gmail-style label behavior for inbox, sent, unread, trash, and
  spam states.

  - For read-only operations, never mutate state.

  - For mutating operations, update entity state machines consistently and return
  plausible API-shaped objects.

  - If an operation references a missing resource, return NOT_FOUND.

  - If an action violates mailbox permissions or visibility constraints, return PERMISSION_DENIED.

  - Keep responses concise but structurally valid.'
