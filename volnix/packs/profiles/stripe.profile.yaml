state_machines:
- entity_type: payment_intent
  field: status
  transitions:
    requires_payment_method:
    - requires_confirmation
    - canceled
    requires_confirmation:
    - requires_action
    - processing
    - requires_capture
    - succeeded
    - canceled
    requires_action:
    - processing
    - requires_confirmation
    - canceled
    processing:
    - succeeded
    - canceled
    requires_capture:
    - succeeded
    - canceled
    succeeded: []
    canceled: []
- entity_type: checkout_session
  field: status
  transitions:
    open:
    - complete
    - expired
    complete: []
    expired: []
- entity_type: subscription
  field: status
  transitions:
    incomplete:
    - active
    - incomplete_expired
    - canceled
    trialing:
    - active
    - canceled
    active:
    - past_due
    - unpaid
    - canceled
    past_due:
    - active
    - unpaid
    - canceled
    unpaid:
    - active
    - canceled
    canceled: []
    incomplete_expired: []
error_modes:
- code: INVALID_REQUEST_ERROR
  when: Required parameters are missing, malformed, or mutually incompatible.
  http_status: 400
  response_body: {}
- code: AUTHENTICATION_ERROR
  when: The API key is missing, invalid, or not permitted for the requested resource.
  http_status: 403
  response_body: {}
- code: RESOURCE_MISSING
  when: The requested customer, payment intent, checkout session, subscription, or
    refund does not exist.
  http_status: 404
  response_body: {}
- code: IDEMPOTENCY_CONFLICT
  when: An idempotency key is reused with parameters that differ from the original
    request.
  http_status: 409
  response_body: {}
- code: PAYMENT_INTENT_UNEXPECTED_STATE
  when: A confirm, capture, or cancel request is made for a payment intent in an invalid
    lifecycle state.
  http_status: 409
  response_body: {}
behavioral_notes:
- Stripe resource IDs are opaque strings such as cus_, pi_, cs_, sub_, and re_ and
  should be preserved exactly.
- Amount values are integer minor units encoded as strings in this profile, for example
  1099 for USD 10.99.
- Create operations typically return object metadata plus current lifecycle status
  immediately, even if downstream settlement is asynchronous.
- Confirming a payment intent may return requires_action instead of succeeded when
  additional customer authentication is needed.
- Manual capture flows use payment intents that can enter requires_capture before
  settlement.
- Checkout sessions are hosted payment flows and expose a redirect URL when first
  created.
- Refunds may be partial if amount is less than the original captured amount.
- Read operations should not invent side effects; mutation operations should update
  stored entity state consistently across linked entities.
examples: []
responder_prompt: 'You are simulating the stripe API. Return realistic Stripe-like
  JSON objects and errors for the operations in this profile.

  Use canonical Stripe-style IDs such as cus_123, pi_123, cs_123, sub_123, ch_123,
  and re_123.

  Enforce required parameters, lifecycle constraints, and HTTP semantics from the
  profile.

  Preserve state across operations so later reads reflect earlier creates and mutations.

  For payment flows, prefer realistic statuses such as requires_payment_method, requires_confirmation,
  requires_action, processing, requires_capture, succeeded, and canceled.

  For subscription flows, use statuses such as incomplete, trialing, active, past_due,
  unpaid, and canceled.

  When returning errors, use the declared error codes and matching HTTP statuses.

  Keep responses concise but plausible, with fields aligned to the relevant Stripe
  resource shape.'
