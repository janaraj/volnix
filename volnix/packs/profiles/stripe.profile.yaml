profile_name: stripe
service_name: stripe
category: money_transactions
version: 0.1.0
fidelity_source: bootstrapped
operations:
- name: stripe_create_customer
  service: stripe
  description: Creates a customer record for storing identity, billing details, and
    payment methods.
  http_method: POST
  http_path: /v1/customers
  parameters:
    email:
      type: string
    name:
      type: string
    description:
      type: string
  required_params: []
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      email:
        type: string
      name:
        type: string
      description:
        type: string
      created:
        type: integer
  is_read_only: false
  creates_entity: customer
- name: stripe_get_customer
  service: stripe
  description: Retrieves an existing customer by ID.
  http_method: GET
  http_path: /v1/customers/{customer}
  parameters:
    customer:
      type: string
  required_params:
  - customer
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      email:
        type: string
      name:
        type: string
      deleted:
        type: string
  is_read_only: true
- name: stripe_create_payment_intent
  service: stripe
  description: Creates a payment intent to track a payment through authorization and
    capture.
  http_method: POST
  http_path: /v1/payment_intents
  parameters:
    amount:
      type: integer
    currency:
      type: string
    customer:
      type: string
    description:
      type: string
    capture_method:
      type: string
  required_params:
  - amount
  - currency
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      amount:
        type: string
      currency:
        type: string
      status:
        type: string
      client_secret:
        type: string
      customer:
        type: string
  is_read_only: false
  creates_entity: payment_intent
- name: stripe_get_payment_intent
  service: stripe
  description: Retrieves a payment intent and its current lifecycle state.
  http_method: GET
  http_path: /v1/payment_intents/{intent}
  parameters:
    intent:
      type: string
  required_params:
  - intent
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      amount:
        type: string
      currency:
        type: string
      status:
        type: string
      customer:
        type: string
  is_read_only: true
- name: stripe_confirm_payment_intent
  service: stripe
  description: Confirms a payment intent to attempt payment completion or advance
    authentication.
  http_method: POST
  http_path: /v1/payment_intents/{intent}/confirm
  parameters:
    intent:
      type: string
    payment_method:
      type: string
    return_url:
      type: string
  required_params:
  - intent
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      status:
        type: string
      client_secret:
        type: string
      latest_charge:
        type: string
  is_read_only: false
  mutates_entity: payment_intent
- name: stripe_capture_payment_intent
  service: stripe
  description: Captures funds for a previously authorized manual-capture payment intent.
  http_method: POST
  http_path: /v1/payment_intents/{intent}/capture
  parameters:
    intent:
      type: string
    amount_to_capture:
      type: string
  required_params:
  - intent
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      status:
        type: string
      amount_received:
        type: string
  is_read_only: false
  creates_entity: settlement
  mutates_entity: payment_intent
- name: stripe_cancel_payment_intent
  service: stripe
  description: Cancels a payment intent that has not yet completed.
  http_method: POST
  http_path: /v1/payment_intents/{intent}/cancel
  parameters:
    intent:
      type: string
    cancellation_reason:
      type: string
  required_params:
  - intent
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      status:
        type: string
      cancellation_reason:
        type: string
  is_read_only: false
  mutates_entity: payment_intent
- name: stripe_create_checkout_session
  service: stripe
  description: Creates a hosted Checkout Session for one-time payment or subscription
    collection.
  http_method: POST
  http_path: /v1/checkout/sessions
  parameters:
    mode:
      type: string
    success_url:
      type: string
    cancel_url:
      type: string
    customer:
      type: string
    client_reference_id:
      type: string
  required_params:
  - mode
  - success_url
  - cancel_url
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      url:
        type: string
      mode:
        type: string
      status:
        type: string
      payment_status:
        type: string
  is_read_only: false
  creates_entity: checkout_session
- name: stripe_get_checkout_session
  service: stripe
  description: Retrieves a Checkout Session and its payment state.
  http_method: GET
  http_path: /v1/checkout/sessions/{session}
  parameters:
    session:
      type: string
  required_params:
  - session
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      mode:
        type: string
      status:
        type: string
      payment_status:
        type: string
      customer:
        type: string
  is_read_only: true
- name: stripe_create_subscription
  service: stripe
  description: Creates a recurring subscription for a customer.
  http_method: POST
  http_path: /v1/subscriptions
  parameters:
    customer:
      type: string
    price:
      type: string
    collection_method:
      type: string
  required_params:
  - customer
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      customer:
        type: string
      status:
        type: string
      current_period_end:
        type: integer
  is_read_only: false
  creates_entity: subscription
- name: stripe_cancel_subscription
  service: stripe
  description: Cancels an active subscription.
  http_method: DELETE
  http_path: /v1/subscriptions/{subscription}
  parameters:
    subscription:
      type: string
  required_params:
  - subscription
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      status:
        type: string
      canceled_at:
        type: string
  is_read_only: false
  mutates_entity: subscription
- name: stripe_create_refund
  service: stripe
  description: Creates a refund against a charge or payment intent.
  http_method: POST
  http_path: /v1/refunds
  parameters:
    charge:
      type: string
    payment_intent:
      type: string
    amount:
      type: integer
    reason:
      type: string
  required_params: []
  response_schema:
    type: object
    properties:
      id:
        type: string
      object:
        type: string
      amount:
        type: string
      status:
        type: string
      charge:
        type: string
      payment_intent:
        type: string
  is_read_only: false
  creates_entity: reversal
  mutates_entity: transaction
- name: stripe_get_balance
  service: stripe
  description: Retrieves the current available and pending account balance.
  http_method: GET
  http_path: /v1/balance
  parameters: {}
  required_params: []
  response_schema:
    type: object
    properties:
      object:
        type: string
      livemode:
        type: string
      available:
        type: string
      pending:
        type: string
  is_read_only: true
