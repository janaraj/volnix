profile_name: twilio
service_name: twilio
category: communications
version: 1.0.0
fidelity_source: curated_profile
operations:
- name: twilio_create_message
  service: twilio
  description: Send an outbound SMS or WhatsApp message from a Twilio-enabled sender
    to a destination address.
  http_method: POST
  http_path: /2010-04-01/Accounts/{AccountSid}/Messages.json
  parameters:
    AccountSid:
      type: string
    To:
      type: string
    From:
      type: string
    Body:
      type: string
    MediaUrl:
      type: string
    StatusCallback:
      type: string
  required_params:
  - AccountSid
  - To
  - From
  response_schema:
    type: object
    properties:
      sid:
        type: string
      account_sid:
        type: string
      to:
        type: string
      from:
        type: string
      body:
        type: string
      status:
        type: string
      direction:
        type: string
      date_created:
        type: string
  is_read_only: false
  creates_entity: message
- name: twilio_list_messages
  service: twilio
  description: List message records for the account, optionally filtered by sender,
    recipient, or date.
  http_method: GET
  http_path: /2010-04-01/Accounts/{AccountSid}/Messages.json
  parameters:
    AccountSid:
      type: string
    To:
      type: string
    From:
      type: string
    PageSize:
      type: string
    Page:
      type: string
  required_params:
  - AccountSid
  response_schema:
    type: object
    properties:
      messages:
        type: string
      next_page_uri:
        type: string
      previous_page_uri:
        type: string
  is_read_only: true
- name: twilio_get_message
  service: twilio
  description: Retrieve a single message resource by SID.
  http_method: GET
  http_path: /2010-04-01/Accounts/{AccountSid}/Messages/{MessageSid}.json
  parameters:
    AccountSid:
      type: string
    MessageSid:
      type: string
  required_params:
  - AccountSid
  - MessageSid
  response_schema:
    type: object
    properties:
      sid:
        type: string
      account_sid:
        type: string
      to:
        type: string
      from:
        type: string
      body:
        type: string
      status:
        type: string
      error_code:
        type: string
  is_read_only: true
- name: twilio_create_call
  service: twilio
  description: Initiate an outbound voice call using a TwiML URL or application instructions.
  http_method: POST
  http_path: /2010-04-01/Accounts/{AccountSid}/Calls.json
  parameters:
    AccountSid:
      type: string
    To:
      type: string
    From:
      type: string
    Url:
      type: string
    Twiml:
      type: string
    StatusCallback:
      type: string
  required_params:
  - AccountSid
  - To
  - From
  response_schema:
    type: object
    properties:
      sid:
        type: string
      account_sid:
        type: string
      to:
        type: string
      from:
        type: string
      status:
        type: string
      direction:
        type: string
      start_time:
        type: string
  is_read_only: false
  creates_entity: call
- name: twilio_get_call
  service: twilio
  description: Retrieve a single call resource by SID.
  http_method: GET
  http_path: /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}.json
  parameters:
    AccountSid:
      type: string
    CallSid:
      type: string
  required_params:
  - AccountSid
  - CallSid
  response_schema:
    type: object
    properties:
      sid:
        type: string
      account_sid:
        type: string
      to:
        type: string
      from:
        type: string
      status:
        type: string
      duration:
        type: string
      direction:
        type: string
  is_read_only: true
- name: twilio_update_call
  service: twilio
  description: Update an in-progress call, commonly to complete or cancel it, or redirect
    it to new TwiML instructions.
  http_method: POST
  http_path: /2010-04-01/Accounts/{AccountSid}/Calls/{CallSid}.json
  parameters:
    AccountSid:
      type: string
    CallSid:
      type: string
    Status:
      type: string
    Url:
      type: string
    Twiml:
      type: string
  required_params:
  - AccountSid
  - CallSid
  response_schema:
    type: object
    properties:
      sid:
        type: string
      status:
        type: string
      date_updated:
        type: string
  is_read_only: false
  mutates_entity: call
- name: twilio_list_incoming_phone_numbers
  service: twilio
  description: List phone numbers owned by the account.
  http_method: GET
  http_path: /2010-04-01/Accounts/{AccountSid}/IncomingPhoneNumbers.json
  parameters:
    AccountSid:
      type: string
    PhoneNumber:
      type: string
    FriendlyName:
      type: string
    PageSize:
      type: string
  required_params:
  - AccountSid
  response_schema:
    type: object
    properties:
      incoming_phone_numbers:
        type: string
      next_page_uri:
        type: string
  is_read_only: true
