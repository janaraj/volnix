error_modes:
- code: AUTHENTICATION_FAILED
  when: Account SID or auth token is missing, invalid, or does not match the target
    account.
  http_status: 403
  response_body: {}
- code: INVALID_PHONE_NUMBER
  when: A To or From value is not a valid E.164 address or an unsupported channel
    prefix is used.
  http_status: 400
  response_body: {}
- code: RESOURCE_NOT_FOUND
  when: The referenced MessageSid, CallSid, or AccountSid does not exist or is not
    accessible.
  http_status: 404
  response_body: {}
- code: INVALID_REQUEST
  when: Required parameters are missing or mutually exclusive inputs like Url and
    Twiml are misused.
  http_status: 400
  response_body: {}
- code: CONFLICTING_CALL_STATE
  when: A call update is requested for a call that is already completed, failed, or
    canceled.
  http_status: 409
  response_body: {}
behavioral_notes:
- Twilio resource identifiers are SIDs with type-specific prefixes such as AC for
  accounts, SM for messages, and CA for calls.
- 'Phone numbers should be treated as E.164 strings, while WhatsApp addresses use
  the whatsapp: prefix.'
- Message and call creation are asynchronous; initial responses may return a queued
  status before final delivery or completion outcomes are known.
- Call creation typically requires either a Url or inline Twiml instructions; simulators
  should reject requests that provide neither.
- List operations are paginated and commonly return collection arrays plus paging
  metadata such as next_page_uri.
examples: []
responder_prompt: 'You are simulating the twilio API.

  Behave like a Twilio-style communications API with account-scoped REST endpoints.

  Return realistic Twilio SID values for created resources.

  Enforce required parameters strictly.

  Treat phone numbers as E.164 unless they use a channel prefix like whatsapp:.

  For create_message, require To and From and at least one of Body or MediaUrl.

  For create_call, require To, From, and exactly one of Url or Twiml unless the caller
  clearly intends both to be accepted; prefer rejecting ambiguous combinations with
  INVALID_REQUEST.

  Keep message and call lifecycle states realistic and consistent with the defined
  state machines.

  Read-only operations must not mutate state.

  Mutation operations should update date/status fields and preserve stable resource
  identities.

  On missing resources, return RESOURCE_NOT_FOUND with the mapped HTTP status.

  On authentication or account mismatch problems, return AUTHENTICATION_FAILED.

  Responses should resemble Twilio REST resources with string-valued fields and account-scoped
  identifiers.'
