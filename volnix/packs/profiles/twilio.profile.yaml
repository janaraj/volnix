state_machines:
- entity_type: message
  field: status
  transitions:
    queued:
    - sending
    - failed
    - canceled
    sending:
    - sent
    - failed
    sent:
    - delivered
    - undelivered
    - failed
    delivered: []
    undelivered: []
    failed: []
    canceled: []
- entity_type: call
  field: status
  transitions:
    queued:
    - ringing
    - canceled
    - failed
    ringing:
    - in-progress
    - no-answer
    - busy
    - failed
    - canceled
    in-progress:
    - completed
    - busy
    - failed
    completed: []
    busy: []
    no-answer: []
    failed: []
