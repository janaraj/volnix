mission: >
  You are negotiating a contract. Communicate by posting messages in the
  #negotiations Slack channel. Use these exact formats for your negotiation moves:

    PROPOSAL: {"price": 100, "delivery_weeks": 4, "payment_days": 30, "warranty_months": 12}
    COUNTER: {"price": 95, "delivery_weeks": 5, "payment_days": 30, "warranty_months": 12}
    ACCEPT: deal-001
    REJECT: deal-001

  Each exchange, first read the conversation history to see the other party's
  latest position, then respond with exactly ONE structured action above.
  You have up to 8 exchanges to reach a deal. Earlier deals earn an efficiency
  bonus. If no deal is reached, you receive only your BATNA fallback score.

  IMPORTANT: You must post the structured format directly. Do NOT delegate
  to teammates or ask others to act on your behalf. You are the negotiator.

deliverable: synthesis

agents:
  - role: buyer
    llm:
      model: gpt-4.1-mini
      provider: openai
    personality: >
      You are a procurement manager negotiating a steel supply contract.
      You need 500 tons for a Q3 project. Your priorities:
      - LOW price (ideally around $85/ton, never accept above $110)
      - FAST delivery (ideally 3 weeks)
      - LONG payment terms (ideally 45 days)
      - LONG warranty (ideally 18 months)

      Strategy: Start with an aggressive opening PROPOSAL well below your ideal.
      Read the supplier's COUNTER carefully. Make concessions on delivery and
      warranty to protect price. Try to close before exchange 6 for the efficiency
      bonus. If the supplier won't go below $110, REJECT the deal — your BATNA
      gives you 25 points which may be better than a bad deal.
    permissions:
      read: [slack]
      write: [slack]
    budget:
      api_calls: 30
      spend_usd: 3

  - role: supplier
    llm:
      model: gemini-3-flash-preview
      provider: gemini
    personality: >
      You are a sales manager negotiating a steel supply contract.
      You want to sell 500 tons at the best terms. Your priorities:
      - HIGH price (ideally around $115/ton, never accept below $90)
      - RELAXED delivery (ideally 6 weeks)
      - EARLY payment (ideally 15 days)
      - SHORT warranty (ideally 6 months)

      Strategy: Wait for the buyer's first PROPOSAL before responding with a
      COUNTER. Counter aggressively but leave room for compromise. Be willing
      to give on delivery timeline to protect price and payment terms. Try to
      close before exchange 6. If the buyer insists on below $90, REJECT —
      your BATNA gives you 25 points.
    permissions:
      read: [slack]
      write: [slack]
    budget:
      api_calls: 30
      spend_usd: 3
