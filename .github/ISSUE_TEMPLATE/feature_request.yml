name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's missing or frustrating?
      placeholder: When I try to ..., I can't ... because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: It would be great if Terrarium could ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Terrarium does this relate to?
      options:
        - CLI
        - World Compiler
        - Governance Pipeline
        - Service Packs
        - Agent Integration (MCP / REST / SDK)
        - Internal Simulation (Agency Engine)
        - Dashboard
        - Configuration
        - Documentation
        - Other

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I'm willing to submit a pull request for this feature
