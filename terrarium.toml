# ══════════════════════════════════════════════════════════════
# Terrarium Base Configuration
# ══════════════════════════════════════════════════════════════
# Override per-environment with terrarium.{env}.toml
# Override locally (git-ignored) with terrarium.local.toml

# ── Simulation ───────────────────────────────────────────────

[simulation]
seed = 42
time_speed = 1.0                    # 1.0 = real-time, 2.0 = double speed
mode = "governed"                   # "governed" | "ungoverned"
behavior = "dynamic"                # "static" | "reactive" | "dynamic"

[simulation.reality]
preset = "messy"                    # "ideal" | "messy" | "hostile"

[simulation.fidelity]
mode = "auto"                       # "auto" | "strict" | "exploratory"

# ── Pipeline ─────────────────────────────────────────────────

[pipeline]
steps = [
    "permission",
    "policy",
    "budget",
    "capability",
    "responder",
    "validation",
    "commit",
]
side_effect_max_depth = 3
timeout_per_step_seconds = 30

# ── Event Bus ────────────────────────────────────────────────

[bus]
# db_path: defaults to ~/.terrarium/data/bus.db (set by paths.py)
queue_size = 1000
persistence_enabled = true

# ── Ledger ───────────────────────────────────────────────────

[ledger]
# db_path: defaults to ~/.terrarium/data/ledger.db (set by paths.py)
retention_days = 90

# ── Persistence ──────────────────────────────────────────────

[persistence]
# base_dir: defaults to ~/.terrarium/data/ (set by paths.py)
wal_mode = true

# ── State Engine ─────────────────────────────────────────────

[state]
# db_path: defaults to ~/.terrarium/data/state.db (set by paths.py)
# snapshot_dir: defaults to ~/.terrarium/data/snapshots/ (set by paths.py)

# ── Policy Engine ────────────────────────────────────────────

[policy]
condition_timeout_ms = 500
max_policies_per_action = 50

# ── Permission Engine ────────────────────────────────────────

[permission]
cache_ttl_seconds = 300

# ── Budget Engine ────────────────────────────────────────────

[budget]
warning_threshold_pct = 80
critical_threshold_pct = 95

# ── Responder Engine ─────────────────────────────────────────

[responder]
max_retries = 2
fallback_enabled = true
profiles_dir = "terrarium/packs/profiles"

# ── Animator Engine ──────────────────────────────────────────

[animator]
creativity_budget = 0.3             # fraction of LLM budget reserved for animator
intensity = 0.5                     # 0.0 = minimal narration, 1.0 = maximal
enabled = true

# ── Adapter Engine ───────────────────────────────────────────

[adapter]
protocols = ["mcp", "http"]
host = "0.0.0.0"
port = 8100

# ── Reporter Engine ──────────────────────────────────────────

[reporter]
output_formats = ["json", "markdown"]
output_dir = "reports"

# ── Feedback Engine ──────────────────────────────────────────

[feedback]
auto_annotate_gaps = true
promotion_min_annotations = 1
promotion_min_operations = 3
promotion_max_error_rate = 0.3
external_sync_enabled = false
sync_check_on_startup = false
sync_max_concurrent = 5
signals_enabled = true
signals_max_runs = 100
signals_include_event_logs = true

# ── API Surface Middleware ───────────────────────────────────

[middleware]
auth_enabled = false
status_codes_enabled = true
prefixes_enabled = false

[middleware.auth_rules]
stripe = "Bearer sk_.*"
slack = "Bearer xoxb-.*"
gmail = "Bearer ya29\\..*"
github = "Bearer (ghp_|gho_|github_pat_).*"
jira = "Bearer .*"
shopify = "Bearer shpat_.*"

[middleware.service_prefixes]
stripe = "/stripe"
slack = "/slack/api"
jira = "/jira"
shopify = "/shopify"

# ── Logging ──────────────────────────────────────────────────

[logging]
level = "INFO"                      # DEBUG | INFO | WARNING | ERROR
format = "text"                     # text | json (future)
llm_debug = false                   # Write LLM responses to data/llm_debug/

# ── Webhook Event Delivery ───────────────────────────────────

[webhook]
enabled = false
max_retries = 3
retry_backoff_base = 1.0
delivery_timeout = 10.0
max_registrations = 100

# ── Dashboard ────────────────────────────────────────────────

[dashboard]
host = "127.0.0.1"
port = 8200
enabled = false
static_dir = "terrarium-dashboard/dist"

# ── Gateway ──────────────────────────────────────────────────

[gateway]
host = "0.0.0.0"
port = 8000
middleware = ["auth", "rate_limit", "audit_log"]

# ── Worlds ───────────────────────────────────────────────────

[worlds]
data_dir = "data/worlds"

# ── Runs ─────────────────────────────────────────────────────

[runs]
# data_dir: defaults to ~/.terrarium/data/runs/ (set by paths.py)
snapshot_on_complete = true

# ── Agency Engine ──────────────────────────────────────────
[agency]
frustration_threshold_tier3 = 0.7
batch_size = 5
max_concurrent_actor_calls = 20
max_recent_interactions = 20
collaboration_mode = "tagged"
collaboration_enabled = true
batch_threshold_default = 3
synthesis_buffer_pct = 0.10
idle_stop_ticks = 5
auto_include_chat = true

# ── Simulation Runner ──────────────────────────────────────
[simulation_runner]
max_logical_time = 86400.0
max_total_events = 10000
max_envelopes_per_event = 20
max_actions_per_actor_per_window = 5
loop_breaker_threshold = 50

# ── Profiles ──────────────────────────────────────────────────
[profiles]
data_dir = "terrarium/packs/profiles"
infer_on_missing = true

# ══════════════════════════════════════════════════════════════
# LLM Configuration
# ══════════════════════════════════════════════════════════════

# ── Defaults ─────────────────────────────────────────────────

[llm.defaults]
type = "acp"
provider = "codex_acp"
default_model = ""
max_tokens = 4096
temperature = 0.7
timeout_seconds = 300

# ── Provider Registry ────────────────────────────────────────

[llm.providers.gemini]
type = "google"
api_key_ref = "GOOGLE_API_KEY"
default_model = "gemini-2.5-flash"

[llm.providers.anthropic]
type = "anthropic"
api_key_ref = "ANTHROPIC_API_KEY"

[llm.providers.openai]
type = "openai_compatible"
base_url = "https://api.openai.com/v1"
api_key_ref = "OPENAI_API_KEY"

[llm.providers.gemini_openai]
type = "openai_compatible"
base_url = "https://generativelanguage.googleapis.com/v1beta/openai"
api_key_ref = "GOOGLE_API_KEY"
default_model = "gemini-2.5-flash"

[llm.providers.ollama]
type = "openai_compatible"
base_url = "http://localhost:11434/v1"
api_key_ref = ""                    # Ollama requires no API key

# ── CLI Providers (local tools, no API key needed) ───────────

[llm.providers.claude_cli]
type = "cli"
command = "claude"
args = ["-p"]                       # -p = non-interactive print mode
default_model = "claude-sonnet-4-6"

[llm.providers.codex_cli]
type = "cli"
command = "codex"
args = ["exec"]                     # exec = non-interactive subcommand

[llm.providers.gemini_cli]
type = "cli"
command = "gemini"
args = []                           # positional prompt for one-shot

# ── ACP Providers (stdio JSON-RPC, bidirectional) ────────────

[llm.providers.claude_acp]
type = "acp"
command = "claude-agent-acp"
auth_method = ""                    # claude uses its own stored credentials
timeout_seconds = 300

[llm.providers.codex_acp]
type = "acp"
command = "codex-acp"
args = ["-c", "model_reasoning_effort=\"low\""]
auth_method = ""                    # codex uses its own stored credentials (codex login)
timeout_seconds = 300

[llm.providers.gemini_acp]
type = "acp"
command = "gemini"
args = ["--experimental-acp"]       # gemini CLI v0.21+ uses --experimental-acp
auth_method = ""                    # gemini uses its own credentials
timeout_seconds = 300

# ── Task-Specific Routing ────────────────────────────────────

[llm.routing.world_compiler]
provider = "codex_acp"
model = ""
max_tokens = 16384
temperature = 0.4

[llm.routing.responder_tier2]
provider = "codex_acp"
model = ""
max_tokens = 4096
temperature = 0.7

[llm.routing.service_bootstrapper]
provider = "codex_acp"
model = ""
max_tokens = 4096
temperature = 0.5

[llm.routing.profile_infer]
provider = "codex_acp"
model = ""
max_tokens = 8192
temperature = 0.4

[llm.routing.animator]
provider = "codex_acp"
model = ""
max_tokens = 2048
temperature = 0.9

[llm.routing.data_generator]
provider = "codex_acp"
model = "gemini-2.5-flash"
max_tokens = 16384
temperature = 0.5

[llm.routing.agency_individual]
provider = "codex_acp"
model = ""
max_tokens = 4096
temperature = 0.7

[llm.routing.agency_batch]
provider = "codex_acp"
model = ""
max_tokens = 8192
temperature = 0.7
