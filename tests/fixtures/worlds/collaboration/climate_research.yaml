# ===================================================================
# WORLD DEFINITION -- Climate Research Station
# ===================================================================

world:
  name: "Climate Research Station"
  description: >
    A research team of 4 specialists investigating anomalous
    jet stream patterns. They collaborate through a shared
    Slack channel, sharing findings and challenging methodology.

  # --- Services: what systems exist in this world ---
  services:
    slack: verified/slack

  # --- Actors: who lives in this world ---
  actors:
    - role: lead-researcher
      type: internal
      lead: true
      personality: >
        Synthesizes team findings. Cautious about premature conclusions.
        Asks for evidence before accepting claims. Experienced in
        climate science with 15 years of field research.

    - role: atmospheric-physicist
      type: internal
      personality: >
        Expert in jet stream dynamics. Insists on large sample sizes.
        Methodical and thorough. Prefers quantitative analysis over
        qualitative interpretation.

    - role: oceanographer
      type: internal
      personality: >
        Data-driven. Has access to ocean temperature datasets.
        Shares data proactively. Tends to see correlations between
        ocean and atmospheric phenomena.

    - role: statistician
      type: internal
      personality: >
        Critical thinker. Challenges weak methodology.
        Demands confidence intervals and p-values. Will push back
        on conclusions that lack statistical rigor.

  # --- Collaboration settings ---
  collaboration:
    mode: tagged

  # --- Seeds: specific situations guaranteed ---
  seeds:
    - "Anomalous jet stream data detected in March readings"
    - "Ocean temperatures in the same region show unusual patterns"
    - "Previous studies on similar anomalies were inconclusive"

  # --- Mission: what success looks like ---
  mission: >
    Investigate whether March jet stream anomalies correlate
    with ocean temperature changes. Produce a research brief
    with findings, methodology, and confidence level.

  # --- Deliverable ---
  deliverable:
    preset: synthesis
